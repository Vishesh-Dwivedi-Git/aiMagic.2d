<section class="hero">
    <div class="hero-bg">
        <div class="hero-grid"></div>
        <div class="hero-gradient"></div>
    </div>

    <div class="hero-content">
        <div class="hero-badge animate-fade-in-up">
            <span class="badge-text">// powered by ai</span>
        </div>

        <h1 class="hero-title animate-fade-in-up" style="animation-delay: 0.1s">
            <span class="title-main">get_2d_Shapes_animations()</span>
            <br />
            <span class="title-sub">from_text_prompts</span>
        </h1>

        <p class="hero-description animate-fade-in-up" style="animation-delay: 0.2s">
            describe your scene → ai creates animation → export as mp4/gif
        </p>

        <div class="hero-actions animate-fade-in-up" style="animation-delay: 0.3s">
            <button class="btn btn-primary btn-lg animate-pulse-glow" (click)="loginClick.emit()">
                start_creating
            </button>
            <a href="#preview" class="btn btn-secondary btn-lg">
                view_demo
            </a>
        </div>

        <div class="hero-note animate-fade-in-up" style="animation-delay: 0.4s">
            <span>// signup required for generate_2d_animations</span>
        </div>
    </div>
</section>
