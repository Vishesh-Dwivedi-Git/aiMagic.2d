<section id="faq" class="section faq-section">
    <div class="faq-container">
        <div class="section-header">
            <h2 class="section-title">faq()</h2>
            <p class="section-subtitle">// frequently asked questions</p>
        </div>

        <div class="faq-list">
            @for (faq of faqs; track faq.question; let i = $index) {
            <div class="faq-item" [class.open]="isOpen(i)">
                <button class="faq-trigger" (click)="toggle(i)">
                    <span>{{ faq.question }}</span>
                    <svg class="faq-chevron" [class.rotated]="isOpen(i)" xmlns="http://www.w3.org/2000/svg" width="20"
                        height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                @if (isOpen(i)) {
                <div class="faq-content animate-fade-in">
                    <p>{{ faq.answer }}</p>
                </div>
                }
            </div>
            }
        </div>
    </div>
</section>
